<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gen-Z Consulting</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #5DE1E7;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3rem;
        }

        .logo {
            max-width: 280px;
            width: 100%;
            height: auto;
        }

        .sections {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .section-title {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .section-links {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .link-btn {
            display: block;
            width: 100%;
            padding: 0.875rem 1.25rem;
            background: rgba(0, 0, 0, 0.25);
            color: #ffffff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            text-align: center;
            transition: background 0.2s ease;
        }

        .link-btn:hover {
            background: rgba(0, 0, 0, 0.35);
        }

        .divider {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
        }

        .linkedin-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.875rem 1.75rem;
            background: #ffffff;
            color: #5DE1E7;
            text-decoration: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: opacity 0.2s ease;
        }

        .linkedin-btn:hover {
            opacity: 0.9;
        }

        .linkedin-btn svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="genz.jpeg" alt="Gen-Z Consulting" class="logo">

        <div class="sections">
            <div class="section">
                <span class="section-title">GenZ</span>
                <div class="section-links">
                    <a href="https://forms.gle/irHnsNNkdUddadxs9" target="_blank" rel="noopener noreferrer" class="link-btn">Czech</a>
                    <a href="https://forms.gle/V9qN9qgsPuQm7J3T8" target="_blank" rel="noopener noreferrer" class="link-btn">English</a>
                </div>
            </div>

            <div class="divider"></div>

            <div class="section">
                <span class="section-title">Companies</span>
                <div class="section-links">
                    <a href="https://forms.gle/VST2rsUwZJcg4tbr5" target="_blank" rel="noopener noreferrer" class="link-btn">Apply</a>
                </div>
            </div>
        </div>

        <a href="https://www.linkedin.com/company/gen-zconsulting/" target="_blank" rel="noopener noreferrer" class="linkedin-btn">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
            LinkedIn
        </a>
    </div>
</body>
</html>
